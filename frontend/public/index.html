<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui"
    />
    <meta name="theme-color" content="#4680ff" />
    <meta name="description" content="DAMR - Digital Automated Meter Reading" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebarHide = document.getElementById("sidebar-hide");
        if (sidebarHide) {
          sidebarHide.addEventListener("click", function (e) {
            e.preventDefault();
            document
              .querySelector(".pc-sidebar")
              .classList.toggle("pc-sidebar-hide");
          });
        }
        const mobileCollapse = document.querySelector(".mobile-collapse");
        if (mobileCollapse) {
          mobileCollapse.addEventListener("click", function (e) {
            e.preventDefault();
            document
              .querySelector(".pc-sidebar")
              .classList.toggle("mob-sidebar-active");
          });
        }
      });
    </script>
    <link
      rel="icon"
      href="%PUBLIC_URL%/assets/images/damr-logo.png"
      type="image/png"
    />

    <link
      rel="stylesheet"
      href="%PUBLIC_URL%/assets/fonts/inter/inter.css"
      id="main-font-link"
    />
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/fonts/fontawesome.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="%PUBLIC_URL%/assets/css/style.css"
      id="main-style-link"
    />
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/style-preset.css" />

    <title>DAMR | PayServe</title>
  </head>
  <body
    data-pc-preset="preset-1"
    data-pc-sidebar-caption="true"
    data-pc-layout="vertical"
    data-pc-direction="ltr"
    data-pc-theme_contrast=""
    data-pc-theme="light"
  >
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="%PUBLIC_URL%/assets/js/fonts/custom-font.js"></script>
  </body>
</html>
